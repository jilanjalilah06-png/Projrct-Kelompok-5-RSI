services:

  # ─── MySQL Database ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: agriconnect_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: agriconnect
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: agriconnect_user
      MYSQL_PASSWORD: secret
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - db_data:/var/lib/mysql
      - ./be/agriconnect_mysql_import.sql:/docker-entrypoint-initdb.d/01_agriconnect_mysql_import.sql
      - ./be/init-n8n-db.sql:/docker-entrypoint-initdb.d/02_init-n8n-db.sql
    ports:
      - "3306:3306"
    networks:
      - agriconnect_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Laravel (PHP-FPM) ────────────────────────────────
  backend:
    build:
      context: ./be
      dockerfile: dockerfile
    container_name: agriconnect_backend
    restart: unless-stopped
    env_file:
      - ./be/env.docker
    volumes:
      - ./be:/var/www
      - ./be/storage:/var/www/storage
    ports:
      - "8001:9000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agriconnect_network

  # ─── Nginx untuk Laravel ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agriconnect_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./be:/var/www
      - ./be/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - agriconnect_network

  # ─── Frontend React/Vue (Vite Dev Server) ─────────────────────
  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: agriconnect_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./fe:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    networks:
      - agriconnect_network
  # ─── n8n Workflow Automation ──────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: agriconnect_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: Asia/Jakarta
      DB_TYPE: mysqldb
      DB_MYSQLDB_HOST: db
      DB_MYSQLDB_PORT: 3306
      DB_MYSQLDB_DATABASE: n8n
      DB_MYSQLDB_USER: agriconnect_user
      DB_MYSQLDB_PASSWORD: secret
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agriconnect_network

  # ─── phpMyAdmin Database Admin ────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: agriconnect_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agriconnect_network

volumes:
  db_data:
  n8n_data:

networks:
  agriconnect_network:
    driver: bridge
